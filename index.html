<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>단어 모험 🌈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#7ec8ff;--sky-deep:#4aa8f0;--sun:#ffd23f;--coral:#ff7a59;
    --mint:#3ddc97;--grape:#9b6dff;--cream:#fff7e8;--ink:#234055;
    --shadow:rgba(35,64,85,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Baloo 2','Jua',system-ui,sans-serif;
    background:linear-gradient(170deg,#aee2ff 0%,#7ec8ff 45%,#9b6dff 130%);
    color:var(--ink);min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;
    padding:18px 14px 40px;overflow-x:hidden;
  }
  .app{width:100%;max-width:460px;position:relative;z-index:2}
  .cloud{position:fixed;font-size:48px;opacity:.55;z-index:1;animation:drift 16s linear infinite;pointer-events:none}
  @keyframes drift{from{transform:translateX(-80px)}to{transform:translateX(110vw)}}
  .card{background:var(--cream);border-radius:30px;padding:24px 20px 26px;
    box-shadow:0 14px 0 var(--shadow),0 22px 40px rgba(35,64,85,.25);border:4px solid #fff;}
  h1.logo{font-family:'Jua',sans-serif;text-align:center;font-size:34px;line-height:1.15;color:#fff;
    text-shadow:0 4px 0 var(--sky-deep),0 7px 12px rgba(0,0,0,.18);margin:6px 0 18px;letter-spacing:1px;}
  .logo .em{font-size:38px}
  .lead{text-align:center;font-size:17px;margin-bottom:18px;font-weight:600}
  .mode{display:flex;align-items:center;gap:14px;width:100%;border:none;cursor:pointer;border-radius:22px;
    padding:18px 16px;margin-bottom:13px;font-family:inherit;font-size:19px;font-weight:700;color:#fff;text-align:left;
    box-shadow:0 6px 0 rgba(0,0,0,.16);transition:transform .08s,box-shadow .08s;}
  .mode:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.16)}
  .mode .ico{font-size:34px;flex:0 0 auto;filter:drop-shadow(0 2px 2px rgba(0,0,0,.2))}
  .mode small{display:block;font-size:13px;font-weight:600;opacity:.92}
  .m1{background:linear-gradient(135deg,#ff9a59,#ff6a85)}
  .m2{background:linear-gradient(135deg,#46c9ff,#3a8dff)}
  .m3{background:linear-gradient(135deg,#46d39a,#27b07a)}
  .m4{background:linear-gradient(135deg,#b07bff,#7a4dff)}
  .foot{text-align:center;margin-top:8px;font-size:13px;color:#5b7892;font-weight:600}

  .hud{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .back{background:#fff;border:3px solid #ffe2b0;border-radius:16px;width:46px;height:46px;font-size:20px;cursor:pointer;box-shadow:0 4px 0 var(--shadow);flex:0 0 auto}
  .back:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow)}
  .stars{font-size:20px;font-weight:800;color:var(--coral);background:#fff;border:3px solid #ffd9a0;border-radius:16px;padding:8px 14px;box-shadow:0 4px 0 var(--shadow);white-space:nowrap}
  .progwrap{flex:1;height:18px;background:#e8edf2;border-radius:20px;overflow:hidden;border:2px solid #fff;box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
  .prog{height:100%;width:0;background:linear-gradient(90deg,var(--mint),var(--sun));border-radius:20px;transition:width .35s ease}

  .qcard{background:#fff;border-radius:24px;padding:22px 18px;box-shadow:0 8px 0 var(--shadow);border:3px solid #eaf3ff;margin-bottom:18px;min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .qtag{align-self:flex-start;font-size:13px;font-weight:700;color:#fff;background:var(--grape);padding:5px 13px;border-radius:30px;margin-bottom:14px}
  .qbig{font-size:84px;text-align:center;margin:4px 0 8px;animation:pop .4s ease;line-height:1}
  @keyframes pop{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .qword{font-family:'Jua',sans-serif;font-size:30px;color:var(--ink);text-align:center}
  .qtext{font-size:19px;line-height:1.55;text-align:center;font-weight:600;color:var(--ink)}
  .qtext .blank{color:var(--coral);font-weight:800;letter-spacing:2px}
  .qhint{display:block;margin-top:10px;font-size:15px;color:#7b96ab;font-family:'Jua',sans-serif}
  .speak{margin-top:14px;background:linear-gradient(135deg,#ffe27a,#ffc23f);border:none;border-radius:30px;padding:10px 20px;font-family:'Jua',sans-serif;font-size:16px;color:#7a4a00;cursor:pointer;box-shadow:0 4px 0 #e0a02a;display:inline-flex;align-items:center;gap:6px}
  .speak:active{transform:translateY(3px);box-shadow:0 1px 0 #e0a02a}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .opt{background:#fff;border:3px solid #d9e6f2;border-radius:20px;padding:16px 8px;font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:0 5px 0 #cdd9e6;transition:transform .07s,box-shadow .07s;display:flex;align-items:center;justify-content:center;min-height:62px;text-align:center;line-height:1.2}
  .opt:active{transform:translateY(4px);box-shadow:0 1px 0 #cdd9e6}
  .opt.right{background:#dcffe9;border-color:var(--mint);box-shadow:0 5px 0 #27b07a;animation:cheer .5s}
  .opt.wrong{background:#ffe1e1;border-color:#ff8a8a;box-shadow:0 5px 0 #e85d5d;animation:shake .4s}
  .opt.dim{opacity:.4}
  @keyframes cheer{0%,100%{transform:scale(1)}40%{transform:scale(1.08)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  .feedback{text-align:center;font-family:'Jua',sans-serif;font-size:21px;margin-top:16px;min-height:28px;font-weight:700}
  .feedback.good{color:var(--mint)}.feedback.bad{color:var(--coral)}
  .replay{display:none;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .replay button{background:#fff;border:3px solid #cfe3ff;border-radius:18px;padding:10px 16px;font-family:'Jua',sans-serif;font-size:15px;color:#2b6fb5;cursor:pointer;box-shadow:0 4px 0 #bcd6f5;display:inline-flex;align-items:center;gap:6px}
  .replay button:active{transform:translateY(3px);box-shadow:0 1px 0 #bcd6f5}
  .next{display:none;width:100%;margin-top:14px;background:linear-gradient(135deg,var(--sun),#ffb13f);border:none;border-radius:20px;padding:16px;font-family:'Jua',sans-serif;font-size:20px;color:#7a4a00;cursor:pointer;box-shadow:0 6px 0 #e09a2a}
  .next:active{transform:translateY(4px);box-shadow:0 2px 0 #e09a2a}

  .result{text-align:center}
  .result .big{font-size:72px;animation:pop .5s ease;margin-bottom:6px}
  .result h2{font-family:'Jua',sans-serif;font-size:30px;margin-bottom:8px}
  .scoreline{font-size:20px;font-weight:700;margin-bottom:6px}
  .starline{font-size:30px;margin-bottom:18px}
  .wrongbox{background:#fff;border-radius:20px;padding:14px;text-align:left;box-shadow:0 6px 0 var(--shadow);margin-bottom:18px;border:3px solid #ffe2b0}
  .wrongbox h3{font-family:'Jua',sans-serif;font-size:16px;color:var(--coral);margin-bottom:8px}
  .wrow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-top:2px dashed #eee;font-weight:600;font-size:16px;cursor:pointer}
  .wrow:first-of-type{border-top:none}
  .wrow .wem{font-size:24px}
  .wrow .wko{color:#7b96ab;font-family:'Jua',sans-serif;margin-left:auto;font-size:15px}
  .wrow .wsp{font-size:18px}
  .again{width:100%;background:linear-gradient(135deg,var(--mint),#27b07a);border:none;border-radius:20px;padding:16px;font-family:'Jua',sans-serif;font-size:20px;color:#fff;cursor:pointer;box-shadow:0 6px 0 #1e8b60;margin-bottom:12px}
  .again:active{transform:translateY(4px);box-shadow:0 2px 0 #1e8b60}
  .home{width:100%;background:#fff;border:3px solid #d9e6f2;border-radius:20px;padding:14px;font-family:'Jua',sans-serif;font-size:18px;color:var(--ink);cursor:pointer;box-shadow:0 5px 0 #cdd9e6}
  .home:active{transform:translateY(3px);box-shadow:0 1px 0 #cdd9e6}
  .upload{background:linear-gradient(135deg,#ff8fb1,#b06dff)!important}
  .divider{display:flex;align-items:center;gap:10px;color:#9bb0c2;font-size:13px;font-weight:700;margin:6px 0 14px}
  .divider::before,.divider::after{content:"";flex:1;height:2px;background:#e3ebf2;border-radius:2px}
  .loader{position:fixed;inset:0;z-index:80;background:rgba(35,64,85,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:#fff;font-family:'Jua',sans-serif;font-size:18px;text-align:center;padding:24px}
  .spin{width:54px;height:54px;border:6px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot 1s linear infinite}
  @keyframes rot{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .conf{position:fixed;top:-20px;font-size:22px;z-index:50;pointer-events:none;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(520deg)}}
  @media (max-width:360px){.opt{font-size:15px}h1.logo{font-size:29px}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important}}
</style>
</head>
<body>
<div class="app">

  <!-- START -->
  <div id="start" class="screen">
    <h1 class="logo"><span class="em">🌈</span> 단어 모험 <span class="em">⚡</span></h1>
    <div class="card">
      <p class="lead">이번 주 단어로 놀아요! 🎒</p>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="if(this.files[0])readPhoto(this.files[0])">
      <button class="mode upload" onclick="document.getElementById('photoInput').click()"><span class="ico">📸</span><span>사진으로 단어 만들기<small>단어장을 찍어 올리면 퀴즈가 만들어져요</small></span></button>
      <div class="divider">또는 놀이 고르기</div>
      <button class="mode m1" onclick="startGame('def')"><span class="ico">🔍</span><span>뜻 보고 단어 찾기<small>영어 설명을 읽거나 듣고 단어를 골라요</small></span></button>
      <button class="mode m2" onclick="startGame('blank')"><span class="ico">✏️</span><span>문장 빈칸 채우기<small>문장을 듣고 빈칸에 들어갈 단어를 골라요</small></span></button>
      <button class="mode m3" onclick="startGame('mean')"><span class="ico">🇰🇷</span><span>단어 보고 뜻 찾기<small>단어를 듣고 우리말 뜻을 골라요</small></span></button>
      <button class="mode m4" onclick="startGame('pic')"><span class="ico">🖼️</span><span>그림 보고 단어 찾기<small>그림만 보고 알맞은 단어를 골라요</small></span></button>
      <p class="foot" id="foot"></p>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen hidden">
    <div class="hud">
      <button class="back" onclick="goHome()">🏠</button>
      <div class="progwrap"><div class="prog" id="prog"></div></div>
      <div class="stars" id="stars">⭐ 0</div>
    </div>
    <div class="qcard">
      <span class="qtag" id="qtag">문제</span>
      <div id="qbody"></div>
      <button class="speak" id="speakBtn" onclick="speakQuestion()">🔊 듣기</button>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="replay" id="replay">
      <button onclick="speakWord()">🔊 단어 듣기</button>
      <button onclick="speakSentence()">🗣️ 문장 듣기</button>
    </div>
    <button class="next" id="next" onclick="nextQuestion()">다음 →</button>
  </div>

  <!-- RESULT -->
  <div id="result" class="screen hidden">
    <div class="card result">
      <div class="big" id="rEmoji">🎉</div>
      <h2 id="rTitle">참 잘했어요!</h2>
      <div class="scoreline" id="rScore"></div>
      <div class="starline" id="rStars"></div>
      <div class="wrongbox hidden" id="wrongbox">
        <h3>🔁 다시 외워볼 단어 (눌러서 들어요)</h3>
        <div id="wrongList"></div>
      </div>
      <button class="again" onclick="startGame(currentMode)">🔄 한 번 더!</button>
  <!-- LOADER -->
  <div id="loader" class="loader hidden"><div class="spin"></div><div id="loaderMsg">사진에서 단어를 읽고 있어요...</div></div>
</div>

<script>
/* =======================================================================
   👉 매주 이 WORDS 부분만 바꾸면 똑같은 앱이 됩니다.
      w = 영어단어 / ko = 우리말뜻 / em = 그림(이모지) / def = 영어설명 / sent = 예문(___에 단어자리)
   ======================================================================= */
const WORDS = [
  {w:"lightning",     ko:"번개",       em:"⚡",  def:"a flash of bright light in the sky produced by electricity between clouds", sent:"The big tree was struck by ___."},
  {w:"tsunami",       ko:"쓰나미",     em:"🌊",  def:"a very large and dangerous ocean wave caused by an earthquake under the sea", sent:"A ___ followed minutes later and damaged the town."},
  {w:"blizzard",      ko:"눈보라",     em:"❄️",  def:"a severe snowstorm with strong winds", sent:"We didn't go out for three days after the ___."},
  {w:"global warming",ko:"지구온난화", em:"🌍",  def:"a slow rise in the Earth's temperature caused by gases like carbon dioxide", sent:"___ is a serious problem in the world today."},
  {w:"evacuate",      ko:"대피하다",   em:"🏃",  def:"to move people away from a dangerous place", sent:"People in the town had to ___ as the storm came."},
  {w:"caution",       ko:"주의·조심",  em:"⚠️",  def:"a warning or careful attention", sent:"Please use ___ when riding a bike on busy streets."},
  {w:"public",        ko:"공공의",     em:"🏛️",  def:"belonging to everyone in a community; not private", sent:"Our town's new library is a beautiful ___ building."},
  {w:"steering wheel",ko:"운전대",     em:"🚗",  def:"the wheel a driver holds to turn the car", sent:"Turn the ___ hard to the right."},
  {w:"passport",      ko:"여권",       em:"🛂",  def:"a government book that lets you travel to other countries", sent:"He forgot his ___ for the flight."},
  {w:"lighthouse",    ko:"등대",       em:"🗼",  def:"a tall tower by the sea with a light that guides ships", sent:"The ___ keeps ships safe from the rocks."}
];

/* ---------- 📸 사진으로 단어 만들기 (Claude가 사진을 읽어요) ---------- */
const READ_PROMPT = "You are reading a child's English vocabulary worksheet (usually a table with columns: Word, part of speech, Definition, example Sentence). Extract EVERY vocabulary row. Return ONLY a JSON array and nothing else (no markdown, no ``` fences, no explanation). Each item must be: {\"w\": the English word exactly, \"ko\": a short Korean meaning, \"em\": ONE emoji that best fits the word, \"def\": a simple English definition under 12 words for a 7-year-old (use the sheet's definition but simplify), \"sent\": the example sentence but with the target word replaced by \"___\"}. If the sheet is missing a definition or sentence for a word, create a simple kid-friendly one. Keep every field short.";

function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
function showLoader(msg){document.getElementById('loaderMsg').textContent=msg||'잠깐만요...';document.getElementById('loader').classList.remove('hidden');}
function hideLoader(){document.getElementById('loader').classList.add('hidden');}

async function readPhoto(file){
  showLoader('사진에서 단어를 읽고 있어요... 📖');
  try{
    const b64=await fileToB64(file);
    let media=file.type||'image/jpeg';
    if(!/^image\/(jpeg|png|webp|gif)$/.test(media)) media='image/jpeg';
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:media,data:b64}},
          {type:"text",text:READ_PROMPT}
        ]}]
      })
    });
    const data=await res.json();
    let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    txt=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
    const start=txt.indexOf('['), end=txt.lastIndexOf(']');
    if(start>=0&&end>start) txt=txt.slice(start,end+1);
    const arr=JSON.parse(txt);
    const clean=arr.filter(x=>x&&x.w&&x.ko).map(x=>{
      let sent=(x.sent&&String(x.sent).includes('___'))?String(x.sent):(String(x.sent||x.w));
      return {w:String(x.w).trim(),ko:String(x.ko).trim(),em:(x.em||'⭐').trim()||'⭐',def:String(x.def||'').trim(),sent:sent.trim()};
    });
    if(clean.length<2) throw new Error('too few');
    applyWords(clean);
    hideLoader();
    alert('단어 '+clean.length+'개를 불러왔어요! 🎉 이제 놀이를 골라보세요.');
  }catch(e){
    hideLoader();
    alert('앗, 사진을 잘 읽지 못했어요. 😅\n· 글씨가 또렷하게 보이게 밝은 곳에서 다시 찍어주세요.\n· 그래도 안 되면 채팅에 사진을 올려 주시면 제가 만들어 드릴게요.');
  }
  document.getElementById('photoInput').value='';
}

function applyWords(arr){
  WORDS.splice(0,WORDS.length,...arr);
  for(const k in WORDS_BY) delete WORDS_BY[k];
  WORDS.forEach(x=>WORDS_BY[x.w]=x.w);
  refreshFoot();
}
function refreshFoot(){document.getElementById('foot').textContent=WORDS.length+'개 단어 · 별을 모아보아요 ⭐';}

let currentMode='def', queue=[], idx=0, score=0, locked=false, wrongWords=[];
document.getElementById('foot').textContent = WORDS.length+'개 단어 · 별을 모아보아요 ⭐';

/* ---------- 음성 (브라우저 읽어주기) ---------- */
let enVoice=null;
function loadVoices(){
  const vs=speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en-US/i.test(v.lang)&&/female|samantha|zira|google/i.test(v.name))
         || vs.find(v=>/^en[-_]US/i.test(v.lang))
         || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text,rate){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=rate||0.85; u.pitch=1.05;
  if(enVoice) u.voice=enVoice;
  speechSynthesis.speak(u);
}
function speakWord(){ speak(queue[idx].w, 0.8); }
function speakSentence(){ speak(queue[idx].sent.replace('___', queue[idx].w), 0.85); }
function speakQuestion(){
  const q=queue[idx];
  if(currentMode==='def') speak(q.def,0.85);
  else if(currentMode==='blank') speak(q.sent.replace('___',', ... ,'),0.85); // 빈칸은 살짝 멈춤
  else if(currentMode==='mean') speak(q.w,0.8);
  else speak(q.w,0.8); // pic: 정답 전엔 버튼 숨김
}

/* ---------- 효과음 ---------- */
let actx;
function beep(type){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const seq=type==='good'?[[660,0],[880,.12],[1180,.24]]:[[300,0],[200,.14]];
    seq.forEach(([f,t])=>{const o=actx.createOscillator(),g=actx.createGain();
      o.type=type==='good'?'sine':'square';o.frequency.value=f;o.connect(g);g.connect(actx.destination);
      const s=actx.currentTime+t;g.gain.setValueAtTime(.0001,s);
      g.gain.exponentialRampToValueAtTime(.2,s+.03);g.gain.exponentialRampToValueAtTime(.0001,s+.22);
      o.start(s);o.stop(s+.24);});
  }catch(e){}
}

/* ---------- 화면 ---------- */
function show(id){['start','quiz','result'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));window.scrollTo(0,0);}
function goHome(){ if('speechSynthesis' in window) speechSynthesis.cancel(); show('start'); }

function startGame(mode){
  currentMode=mode; queue=shuffle([...WORDS]); idx=0; score=0; wrongWords=[];
  show('quiz'); renderQuestion();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- 문제 ---------- */
function renderQuestion(){
  locked=false;
  const q=queue[idx];
  const tag=document.getElementById('qtag');
  const body=document.getElementById('qbody');
  const speakBtn=document.getElementById('speakBtn');
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('replay').style.display='none';
  document.getElementById('next').style.display='none';
  document.getElementById('prog').style.width=(idx/queue.length*100)+'%';
  document.getElementById('stars').textContent='⭐ '+score;

  speakBtn.style.display='inline-flex';
  if(currentMode==='def'){
    tag.textContent='🔍 어떤 단어일까요?';
    body.innerHTML='<div class="qtext">'+q.def+'<span class="qhint">힌트: '+q.ko+'</span></div>';
    speakBtn.textContent='🔊 설명 듣기';
    buildOptions(q.w,'word');
  }else if(currentMode==='blank'){
    tag.textContent='✏️ 빈칸에 들어갈 단어는?';
    body.innerHTML='<div class="qtext">'+q.sent.replace('___','<span class="blank">______</span>')+'<span class="qhint">힌트: '+q.ko+'</span></div>';
    speakBtn.textContent='🗣️ 문장 듣기';
    buildOptions(q.w,'word');
  }else if(currentMode==='mean'){
    tag.textContent='🇰🇷 무슨 뜻일까요?';
    body.innerHTML='<div class="qword">'+q.w+'</div>';
    speakBtn.textContent='🔊 발음 듣기';
    buildOptions(q.w,'mean');
  }else{ // pic
    tag.textContent='🖼️ 무엇일까요?';
    body.innerHTML='<div class="qbig">'+q.em+'</div>';
    speakBtn.style.display='none'; // 정답 전엔 발음 숨김(힌트 방지)
    buildOptions(q.w,'word');
  }
}

function buildOptions(answerWord, kind){
  const opts=document.getElementById('options'); opts.innerHTML='';
  const others=shuffle(WORDS.filter(x=>x.w!==answerWord)).slice(0,3);
  const pool=shuffle([WORDS.find(x=>x.w===answerWord),...others]);
  pool.forEach(item=>{
    const b=document.createElement('button'); b.className='opt';
    b.textContent = kind==='mean' ? item.ko : item.w;
    b.onclick=()=>choose(b,item.w===answerWord,kind);
    opts.appendChild(b);
  });
}

/* ---------- 채점 ---------- */
function choose(btn, correct, kind){
  if(locked) return; locked=true;
  const fb=document.getElementById('feedback');
  const all=[...document.querySelectorAll('.opt')];
  const ans=queue[idx];
  if(correct){
    btn.classList.add('right'); score++;
    document.getElementById('stars').textContent='⭐ '+score;
    fb.textContent=pick(['최고예요! 🎉','정답이에요! 🌟','우와 잘했어요! 👏','똑똑해요! 💡']);
    fb.className='feedback good'; beep('good'); confetti();
  }else{
    btn.classList.add('wrong');
    if(!wrongWords.find(x=>x.w===ans.w)) wrongWords.push(ans);
    const lab=kind==='mean'?ans.ko:ans.w;
    all.forEach(b=>{ if(b.textContent===lab) b.classList.add('right'); });
    fb.textContent='괜찮아요! 정답은 "'+lab+'" 예요 💪';
    fb.className='feedback bad'; beep('bad');
  }
  all.forEach(b=>{ if(!b.classList.contains('right')&&!b.classList.contains('wrong'))b.classList.add('dim'); b.onclick=null; });
  // 정답 단어 발음 자동 재생 + 듣기 버튼 노출
  setTimeout(()=>speak(ans.w,0.8), 350);
  document.getElementById('replay').style.display='flex';
  const nx=document.getElementById('next'); nx.style.display='block';
  nx.textContent=(idx===queue.length-1)?'결과 보기 🏆':'다음 →';
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function nextQuestion(){ if('speechSynthesis' in window) speechSynthesis.cancel(); idx++; (idx>=queue.length)?showResult():renderQuestion(); }

/* ---------- 결과 ---------- */
function showResult(){
  document.getElementById('prog').style.width='100%'; show('result');
  const total=queue.length, pct=score/total;
  const em=document.getElementById('rEmoji'), title=document.getElementById('rTitle');
  if(pct===1){em.textContent='🏆';title.textContent='완벽해요! 천재!';}
  else if(pct>=.7){em.textContent='🎉';title.textContent='참 잘했어요!';}
  else if(pct>=.4){em.textContent='💪';title.textContent='조금만 더 힘내요!';}
  else{em.textContent='🌱';title.textContent='다시 도전해볼까요?';}
  document.getElementById('rScore').textContent='맞힌 개수: '+score+' / '+total;
  const full=Math.round(pct*5);
  document.getElementById('rStars').textContent='⭐'.repeat(full)+'☆'.repeat(5-full);
  const wb=document.getElementById('wrongbox'), wl=document.getElementById('wrongList');
  if(wrongWords.length){
    wb.classList.remove('hidden');
    wl.innerHTML=wrongWords.map((x,i)=>
      '<div class="wrow" onclick="speak(WORDS_BY[\''+x.w.replace(/'/g,"\\'")+'\'],0.8)"><span class="wem">'+x.em+'</span>'+x.w+'<span class="wko">'+x.ko+'</span><span class="wsp">🔊</span></div>'
    ).join('');
  }else wb.classList.add('hidden');
  if(pct>=.7){ for(let i=0;i<3;i++) setTimeout(confetti,i*250); }
}
const WORDS_BY={}; WORDS.forEach(x=>WORDS_BY[x.w]=x.w);

/* ---------- 색종이 / 구름 ---------- */
function confetti(){
  const ems=['⭐','🎊','✨','🌈','💛','💙'];
  for(let i=0;i<14;i++){const c=document.createElement('div');c.className='conf';
    c.textContent=ems[Math.floor(Math.random()*ems.length)];c.style.left=Math.random()*100+'vw';
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s';c.style.fontSize=(16+Math.random()*16)+'px';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3200);}
}
['☁️','⛅','☁️'].forEach((c,i)=>{const e=document.createElement('div');e.className='cloud';e.textContent=c;
  e.style.top=(8+i*26)+'%';e.style.animationDuration=(14+i*5)+'s';e.style.animationDelay=(-i*4)+'s';
  document.body.appendChild(e);});
</script>
